<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Resizer App</title>
    <script src="./tailwind.js"></script>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" crossorigin="anonymous"></script>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center font-sans">

    <div x-data="videoResizer()" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-2xl">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 border-b pb-4">Resize Video</h1>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">Upload Video</label>
            <input type="file" accept="video/*" @change="handleFileUpload"
                class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition">
        </div>

        <div class="mb-6 relative" x-data="{ open: false }">
            <label class="block text-sm font-medium text-gray-700 mb-2">Pilih Ukuran</label>
            <button @click="open = !open" type="button"
                class="flex items-center justify-between w-full bg-white border border-gray-300 rounded-lg shadow-sm px-4 py-2 text-left cursor-default focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                <span x-text="selectedResolutionText"></span>
                <svg class="h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                    fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M10 3a1 1 0 01.707.293l3 3a1 1 0 01-1.414 1.414L10 5.414 7.707 7.707a1 1 0 01-1.414-1.414l3-3A1 1 0 0110 3zm-3.707 9.293a1 1 0 011.414 0L10 14.586l2.293-2.293a1 1 0 011.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z"
                        clip-rule="evenodd" />
                </svg>
            </button>

            <div x-show="open" @click.away="open = false"
                class="absolute z-10 mt-1 w-full bg-white shadow-lg max-h-60 rounded-md py-1 text-base ring-1 ring-black ring-opacity-5 overflow-auto sm:text-sm"
                style="display: none;">
                <div @click="selectResolution('854x480', '480p (SD)'); open = false"
                    class="cursor-pointer select-none relative py-2 pl-3 pr-9 hover:bg-blue-50">480p (SD)</div>
                <div @click="selectResolution('1280x720', '720p (HD)'); open = false"
                    class="cursor-pointer select-none relative py-2 pl-3 pr-9 hover:bg-blue-50">720p (HD)</div>
                <div @click="selectResolution('1920x1080', '1080p (Full HD)'); open = false"
                    class="cursor-pointer select-none relative py-2 pl-3 pr-9 hover:bg-blue-50">1080p (Full HD)</div>
            </div>
        </div>

        <button @click="processVideo" :disabled="!videoFile || isProcessing"
            class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-4 rounded-lg transition disabled:opacity-50 flex justify-center items-center">
            <span x-show="!isProcessing">Generate Resize</span>
            <span x-show="isProcessing">Memproses... <span x-text="progressText"></span></span>
        </button>

        <div x-show="outputUrl" class="mt-6 p-4 bg-green-50 rounded-lg border border-green-200" style="display: none;">
            <p class="text-green-800 text-sm mb-3">Selesai! Video kamu siap diunduh.</p>
            <a :href="outputUrl" download="resized_video.mp4"
                class="inline-block bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition">
                Download Hasil
            </a>
        </div>
    </div>

    <script>
        function videoResizer() {
            return {
                videoFile: null,
                selectedResolution: '1280x720',
                selectedResolutionText: '720p (HD)',
                isProcessing: false,
                progressText: '',
                outputUrl: null,
                // TARUH API KEY KAMU DI BAWAH INI
                apiKey: 'eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9.eyJhdWQiOiIxIiwianRpIjoiZjFmMGVlZTNiYTk5NmEyNmQyYjdmOWM1YTAzY2Q5YTZkYmU3MzBiOGU1NjkwMjNkYzU4ZjIyYjNiMjBhNjZmMGQ3MjBlYTE3NmI5MTY2YTYiLCJpYXQiOjE3ODI0NDI4MTEuNDkyOTEyLCJuYmYiOjE3ODI0NDI4MTEuNDkyOTEzLCJleHAiOjQ5MzgxMTY0MTEuNDg2NDAzLCJzdWIiOiI3NjEwOTk3MSIsInNjb3BlcyI6WyJ0YXNrLnJlYWQiLCJ0YXNrLndyaXRlIiwid2ViaG9vay5yZWFkIiwid2ViaG9vay53cml0ZSJdfQ.DyzW2xOT6u_n25N2Wa95rlifTaQ4Xe3Mt7J5d9s2Lm4tz45K8wHRu1zXfIOCWnNYRYgJ-ioK5ZDNI3gbaZc2UjxBRnsKI-8nB5fVb4QnfMotu_5dGGO9yJuMGaLmOZFmznmn1RBMsuy6PPP0KfmlJG8G8wWMmlH_Sj0oSWOlfMT0U1MpNKY19mPDycE0-gCsGXY5rtuUyPpzecOXAriKfZcwcavSFlfWqCyB7BDXmzhaTddkQ0Vhg_L9vEWzibvPXiTmT2AdAGuMgxn1M46379E9C3kokIkW9_5vkfc_0aAfHNeZBlTXZ87OctPfoMrDutJU0cNmtnwYq2U8g6SLoUPyUVz3hKStizJ-CLibEI3iNuNetUOMPuL82Jw5dZpNPer0I0j3BoPOQH0jFErl-fqjGyFYCh9-eMrRJRlWLE_Hq1ovem9M8_qtuxfjzmu0YjTWdzckqletUItNrO97YPT61EnW6OpbC3QxxTlUiF53qXrUa3xSTnrgYNbMuNdsJh46cb_lFeeQcsdozByqa-H-acwUs9n1LiI__4KRXtMJ_F3SCr-UZljO_2z-VL8CrLn7mHGIusq6mTMGGrwnPjpjunE7xT_unqOwsJeyyNFagL1r1bDqFt6F-KDOg6z9oMt7jQKUKK9_L2-5Qc6wmGJH9P-u3sq11S_zc3jEr_s',

                handleFileUpload(event) {
                    this.videoFile = event.target.files[0];
                    this.outputUrl = null;
                },

                selectResolution(val, text) {
                    this.selectedResolution = val;
                    this.selectedResolutionText = text;
                },

                async processVideo() {
                    if (!this.videoFile) return;

                    this.isProcessing = true;
                    this.outputUrl = null;

                    try {
                        const [videoWidth, videoHeight] = this.selectedResolution.split('x').map(Number);

                        // 1. MEMBUAT JOB KONVERSI
                        this.progressText = 'Menyiapkan server...';

                        const jobRes = await fetch('https://api.cloudconvert.com/v2/jobs', {
                            method: 'POST',
                            headers: {
                                'Authorization': `Bearer ${this.apiKey}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                tasks: {
                                    'import-video': { operation: 'import/upload' },
                                    'convert-video': {
                                        operation: 'convert',
                                        input: 'import-video',
                                        output_format: 'mp4',
                                        width: videoWidth,
                                        height: videoHeight
                                    },
                                    'export-video': {
                                        operation: 'export/url',
                                        input: 'convert-video'
                                    }
                                }
                            })
                        });

                        if (!jobRes.ok) {
                            const errorData = await jobRes.json();
                            throw new Error(errorData.message || 'Gagal menghubungi API CloudConvert');
                        }

                        const jobData = await jobRes.json();
                        const jobId = jobData.data.id;
                        const uploadTask = jobData.data.tasks.find(t => t.name === 'import-video');

                        // 2. MENGUNGGAH VIDEO KE CLOUDCONVERT (DENGAN PARAMETER KEAMANAN)
                        this.progressText = 'Mengunggah video...';
                        const formData = new FormData();

                        // WAJIB: Memasukkan semua parameter token dari CloudConvert
                        for (const [key, value] of Object.entries(uploadTask.result.form.parameters)) {
                            formData.append(key, value);
                        }
                        // File HARUS dimasukkan paling terakhir setelah parameter keamanan
                        formData.append('file', this.videoFile);

                        const uploadRes = await fetch(uploadTask.result.form.url, {
                            method: 'POST',
                            body: formData
                        });

                        // Cek jika upload ditolak
                        if (!uploadRes.ok) {
                            throw new Error('Gagal mengunggah video. Server menolak file.');
                        }

                        // 3. MENUNGGU PROSES SELESAI (POLLING)
                        this.progressText = 'Memproses ukuran video...';
                        let jobFinished = false;
                        let finalUrl = null;

                        while (!jobFinished) {
                            await new Promise(resolve => setTimeout(resolve, 3000));

                            const checkRes = await fetch(`https://api.cloudconvert.com/v2/jobs/${jobId}`, {
                                headers: { 'Authorization': `Bearer ${this.apiKey}` }
                            });
                            const checkData = await checkRes.json();
                            const status = checkData.data.status;

                            if (status === 'finished') {
                                jobFinished = true;
                                const exportTask = checkData.data.tasks.find(t => t.name === 'export-video');
                                finalUrl = exportTask.result.files[0].url;
                            } else if (status === 'error') {
                                throw new Error('Server gagal memproses format video ini.');
                            }
                        }

                        // 4. SELESAI
                        this.outputUrl = finalUrl;

                    } catch (error) {
                        console.error(error);
                        alert(`Terjadi kesalahan: ${error.message}`);
                    } finally {
                        this.isProcessing = false;
                    }
                }
            }
        }
    </script>
</body>

</html>

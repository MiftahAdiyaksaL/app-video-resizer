<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Resizer App</title>
    <script src="https://cdn.tailwindcss.com/3.4.4" crossorigin="anonymous"></script>
    
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" crossorigin="anonymous"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.js" crossorigin="anonymous"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center font-sans">

    <div x-data="videoResizer()" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-2xl">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 border-b pb-4">Resize Video</h1>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">Upload Video</label>
            <input type="file" accept="video/*" @change="handleFileUpload" 
                    class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition">
        </div>

        <div class="mb-6 relative" x-data="{ open: false }">
            <label class="block text-sm font-medium text-gray-700 mb-2">Pilih Ukuran</label>
            <button @click="open = !open" type="button" class="flex items-center justify-between w-full bg-white border border-gray-300 rounded-lg shadow-sm px-4 py-2 text-left cursor-default focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                <span x-text="selectedResolutionText"></span>
                <svg class="h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 3a1 1 0 01.707.293l3 3a1 1 0 01-1.414 1.414L10 5.414 7.707 7.707a1 1 0 01-1.414-1.414l3-3A1 1 0 0110 3zm-3.707 9.293a1 1 0 011.414 0L10 14.586l2.293-2.293a1 1 0 011.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
            </button>

            <div x-show="open" @click.away="open = false" class="absolute z-10 mt-1 w-full bg-white shadow-lg max-h-60 rounded-md py-1 text-base ring-1 ring-black ring-opacity-5 overflow-auto sm:text-sm" style="display: none;">
                <div @click="selectResolution('854x480', '480p (SD)'); open = false" class="cursor-pointer select-none relative py-2 pl-3 pr-9 hover:bg-blue-50">480p (SD)</div>
                <div @click="selectResolution('1280x720', '720p (HD)'); open = false" class="cursor-pointer select-none relative py-2 pl-3 pr-9 hover:bg-blue-50">720p (HD)</div>
                <div @click="selectResolution('1920x1080', '1080p (Full HD)'); open = false" class="cursor-pointer select-none relative py-2 pl-3 pr-9 hover:bg-blue-50">1080p (Full HD)</div>
            </div>
        </div>

        <button @click="processVideo" :disabled="!videoFile || isProcessing" 
                class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-4 rounded-lg transition disabled:opacity-50 flex justify-center items-center">
            <span x-show="!isProcessing">Generate Resize</span>
            <span x-show="isProcessing">Memproses... <span x-text="progress + '%'"></span></span>
        </button>

        <div x-show="outputUrl" class="mt-6 p-4 bg-green-50 rounded-lg border border-green-200" style="display: none;">
            <p class="text-green-800 text-sm mb-3">Selesai! Video kamu siap diunduh.</p>
            <a :href="outputUrl" download="resized_video.mp4" class="inline-block bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition">
                Download Hasil
            </a>
        </div>
    </div>

    <script>
        const { FFmpeg } = FFmpegWASM;
        const { fetchFile } = FFmpegUtil;

        function videoResizer() {
            return {
                videoFile: null,
                selectedResolution: '1280x720',
                selectedResolutionText: '720p (HD)',
                isProcessing: false,
                progress: 0,
                outputUrl: null,
                ffmpeg: null,

                async init() {
                    this.ffmpeg = new FFmpeg();
                    this.ffmpeg.on('progress', ({ progress }) => {
                        this.progress = Math.round(progress * 100);
                    });
                },

                handleFileUpload(event) {
                    this.videoFile = event.target.files[0];
                    this.outputUrl = null;
                },

                selectResolution(val, text) {
                    this.selectedResolution = val;
                    this.selectedResolutionText = text;
                },

                async processVideo() {
                    if (!this.videoFile) return;
                    
                    this.isProcessing = true;
                    this.progress = 0;
                    this.outputUrl = null;

                    try {
                        if (!this.ffmpeg.loaded) {
                            await this.ffmpeg.load();
                        }

                        const inputName = 'input_video.mp4';
                        const outputName = 'output_video.mp4';

                        // Menulis file ke virtual file system FFmpeg
                        await this.ffmpeg.writeFile(inputName, await fetchFile(this.videoFile));

                        // Menjalankan command resize
                        await this.ffmpeg.exec([
                            '-i', inputName,
                            '-vf', `scale=${this.selectedResolution}`,
                            outputName
                        ]);

                        // Membaca hasil dan membuat URL download
                        const data = await this.ffmpeg.readFile(outputName);
                        const blob = new Blob([data.buffer], { type: 'video/mp4' });
                        this.outputUrl = URL.createObjectURL(blob);

                    } catch (error) {
                        console.error('Error saat memproses video:', error);
                        alert('Terjadi kesalahan saat memproses video.');
                    } finally {
                        this.isProcessing = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
